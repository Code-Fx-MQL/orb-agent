name: Deploy EasyPanel

on:
  workflow_dispatch:

concurrency:
  group: deploy-orb-agent
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest -q -m "not integration" --tb=short
        env:
          ORB_DATA_SOURCE: stub

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate production env
        run: python scripts/generate_env_production.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          ORB_WEBHOOK_APP_ID: ${{ vars.WEBHOOK_APP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ORB_UI_PASSWORD: ${{ secrets.ORB_UI_PASSWORD }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          ORB_LIVE_APPROVAL_TOKEN: ${{ secrets.ORB_LIVE_APPROVAL_TOKEN }}

      - name: Build deploy ZIP
        run: python scripts/build_easypanel_zip.py

      - name: Deploy to EasyPanel
        run: |
          python scripts/upload-easypanel-api.py \
            --zip orb-agent-easypanel-deploy.zip \
            --project "${{ vars.EASYPANEL_PROJECT }}" \
            --service "${{ vars.EASYPANEL_SERVICE }}"
        env:
          EASYPANEL_URL: ${{ secrets.EASYPANEL_URL }}
          EASYPANEL_TOKEN: ${{ secrets.EASYPANEL_TOKEN }}