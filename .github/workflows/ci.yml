name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Unit tests (stub only)
        run: pytest -q -m "not integration"
        env:
          ORB_DATA_SOURCE: stub

      - name: Ruff
        run: ruff check src tests

  validate:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Doc gardening
        run: python scripts/doc_garden.py

  integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: CCXT integration (optional)
        run: pytest -q -m integration --maxfail=1
        env:
          ORB_DATA_SOURCE: ccxt